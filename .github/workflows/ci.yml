name: CI - API Defasagem

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install flask feast pandas scikit-learn joblib

    - name: Teste simples da API (import)
      run: |
        python -c "import api; print('API importada com sucesso')"

    - name: Build da imagem Docker
      run: |
        docker build -t api-defasagem:latest .